<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Hub</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#fdf8f3;color:#3a2e24;min-height:100vh;overflow:hidden}
:root{
  --mom:#d4537e;--mom-light:#fbeaf0;--mom-dark:#72243e;
  --dad:#378add;--dad-light:#e6f1fb;--dad-dark:#0c447c;
  --pepijn:#1d9e75;--pepijn-light:#e1f5ee;--pepijn-dark:#085041;
  --abel:#ba7517;--abel-light:#faeeda;--abel-dark:#633806;
  --bg:#fdf8f3;--card:#fffcf8;--border:#ede5d8;--text:#3a2e24;--muted:#8a7a6a
}
.app{display:flex;flex-direction:column;height:100vh}
header{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px}
.logo i{font-size:20px;color:var(--abel)}
.logo h1{font-size:16px;font-weight:600}
.view-tabs{display:flex;background:#f0e9df;border-radius:8px;padding:3px;gap:2px}
.view-tab{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--muted);transition:all .15s}
.view-tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.week-nav{display:flex;align-items:center;gap:6px;margin-left:auto}
.week-nav button{background:none;border:1px solid var(--border);border-radius:7px;padding:5px 9px;cursor:pointer;color:var(--text);font-size:12px}
.week-nav button:hover{background:var(--border)}
.week-label{font-size:12px;font-weight:500;min-width:140px;text-align:center}
.sync-btns{display:flex;gap:6px}
.sync-btn{display:flex;align-items:center;gap:4px;font-size:11px;padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:var(--card);cursor:pointer;color:var(--text);font-weight:500}
.sync-btn.google{border-color:#ea4335;color:#ea4335}
.sync-btn.outlook{border-color:#0078d4;color:#0078d4}
.sync-btn.connected{border-color:#1d9e75;color:#1d9e75;background:var(--pepijn-light)}
.wake-indicator{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);padding:4px 8px;border-radius:6px;border:1px solid var(--border)}
.wake-dot{width:7px;height:7px;border-radius:50%;background:#ccc}
.wake-dot.active{background:#1d9e75}

.main{flex:1;display:flex;overflow:hidden}
.calendar-area{flex:1;overflow:auto;padding:12px}
.sidebar{width:220px;border-left:1px solid var(--border);background:var(--card);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sidebar-inner{flex:1;overflow-y:auto;padding:12px}
.sidebar h3{font-size:12px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:5px;color:var(--text)}
.sidebar h3 i{font-size:14px;color:var(--muted)}

/* avatars */
.family-avatars{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.avatar-chip{display:flex;align-items:center;gap:5px;padding:4px 10px 4px 4px;border-radius:20px;font-size:11px;font-weight:600}
.avatar-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff}

/* week grid */
.grid-wrapper{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.day-headers{display:grid;grid-template-columns:72px repeat(7,1fr);border-bottom:1px solid var(--border)}
.day-header{padding:8px 6px;text-align:center;font-size:11px;font-weight:600;color:var(--muted)}
.day-header.today{background:var(--abel-light);color:var(--abel-dark)}
.day-header span{display:block;font-size:16px;font-weight:700;color:var(--text)}
.day-header.today span{color:var(--abel)}
.row-label{padding:6px 8px;display:flex;align-items:flex-start;gap:5px;border-right:1px solid var(--border);background:var(--bg)}
.row-label .dot{width:9px;height:9px;border-radius:50%;margin-top:3px;flex-shrink:0}
.row-label .name{font-size:10px;font-weight:600}
.person-row{display:grid;grid-template-columns:72px repeat(7,1fr);border-bottom:1px solid var(--border);min-height:64px}
.person-row:last-child{border-bottom:none}
.day-cell{border-right:.5px solid var(--border);padding:4px;min-height:64px;display:flex;flex-direction:column;gap:2px;cursor:pointer;transition:background .1s;position:relative}
.day-cell:hover{background:#fdf5ec}
.day-cell:last-child{border-right:none}
.day-cell.today-col{background:rgba(186,117,23,.04)}
.event-chip{border-radius:4px;padding:2px 5px;font-size:9px;font-weight:500;display:flex;align-items:center;gap:2px;line-height:1.4;cursor:pointer}
.event-chip i{font-size:8px}
.add-btn{opacity:0;font-size:14px;color:var(--muted);cursor:pointer;margin-top:auto;align-self:flex-end;border:none;background:none;padding:1px 3px;line-height:1}
.day-cell:hover .add-btn{opacity:1}

/* dinner row */
.dinner-row{display:grid;grid-template-columns:72px repeat(7,1fr);background:#fff9f0;border-top:2px solid var(--border)}
.dinner-label{padding:6px 8px;border-right:1px solid var(--border);display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--abel-dark)}
.dinner-cell{border-right:.5px solid var(--border);padding:5px;cursor:pointer;display:flex;flex-direction:column;gap:2px;min-height:52px}
.dinner-cell:hover{background:var(--abel-light)}
.dinner-cell:last-child{border-right:none}
.dinner-cell.today-col{background:rgba(186,117,23,.05)}
.dinner-cell .meal{font-size:10px;color:var(--text);font-weight:500;line-height:1.3}
.dinner-cell .no-meal{font-size:9px;color:var(--muted);font-style:italic}
.cook-badge{display:inline-flex;align-items:center;gap:3px;border-radius:10px;padding:1px 5px;font-size:9px;font-weight:600}

/* day view */
.day-view-grid{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.day-col-headers{display:grid;border-bottom:1px solid var(--border)}
.day-col-hdr{padding:10px 8px;text-align:center;font-size:11px;font-weight:700;border-right:.5px solid var(--border)}
.day-col-hdr:last-child{border-right:none}
.day-view-row{display:grid;border-bottom:.5px solid var(--border);min-height:60px}
.day-view-label{padding:6px 8px;border-right:1px solid var(--border);font-size:10px;font-weight:600;display:flex;align-items:center;gap:4px;background:var(--bg);flex-shrink:0}
.day-view-cell{border-right:.5px solid var(--border);padding:5px;display:flex;flex-direction:column;gap:3px;cursor:pointer;min-height:60px}
.day-view-cell:hover{background:#fdf5ec}
.day-view-cell:last-child{border-right:none}

/* month view */
.month-grid{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.month-weekdays{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)}
.month-weekday{padding:7px;text-align:center;font-size:11px;font-weight:600;color:var(--muted)}
.month-cells{display:grid;grid-template-columns:repeat(7,1fr)}
.month-cell{border-right:.5px solid var(--border);border-bottom:.5px solid var(--border);padding:5px;min-height:80px;cursor:pointer;transition:background .1s;vertical-align:top}
.month-cell:hover{background:#fdf5ec}
.month-cell.other-month{opacity:.4}
.month-cell.today-col{background:rgba(186,117,23,.06)}
.month-day-num{font-size:12px;font-weight:600;margin-bottom:3px;color:var(--text)}
.month-cell.today-col .month-day-num{color:var(--abel);background:var(--abel-light);width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.month-dot-row{display:flex;flex-wrap:wrap;gap:2px;margin-bottom:2px}
.month-ev-chip{font-size:8px;border-radius:3px;padding:1px 4px;font-weight:500;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.month-dinner{font-size:8px;color:var(--abel-dark);background:var(--abel-light);border-radius:3px;padding:1px 4px;margin-top:2px;display:flex;align-items:center;gap:2px}

/* tasks */
.task-person{margin-bottom:10px}
.task-person-hdr{display:flex;align-items:center;gap:5px;margin-bottom:4px;font-size:10px;font-weight:700}
.task-item{display:flex;align-items:flex-start;gap:5px;margin-bottom:3px;padding:3px 5px;border-radius:5px;cursor:pointer}
.task-item:hover{background:var(--bg)}
.task-check{width:13px;height:13px;border-radius:3px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.task-check.done{background:var(--pepijn);border-color:var(--pepijn)}
.task-check.done i{font-size:8px;color:#fff}
.task-text{font-size:10px;color:var(--text);line-height:1.4}
.task-text.done{text-decoration:line-through;color:var(--muted)}
.add-task-btn{font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer;padding:2px 3px;display:flex;align-items:center;gap:2px}
.add-task-btn:hover{color:var(--text)}

/* modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(58,46,36,.35);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:14px;padding:18px;width:320px;border:1px solid var(--border)}
.modal h2{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.modal label{display:block;font-size:11px;color:var(--muted);margin-bottom:3px;margin-top:9px;font-weight:500}
.modal input,.modal select{width:100%;padding:7px 9px;border-radius:7px;border:1px solid var(--border);background:var(--bg);font-size:12px;color:var(--text);outline:none}
.modal input:focus,.modal select:focus{border-color:var(--abel)}
.modal-btns{display:flex;gap:7px;margin-top:14px;justify-content:flex-end}
.btn-cancel{padding:6px 14px;border-radius:7px;border:1px solid var(--border);background:none;cursor:pointer;font-size:12px;color:var(--muted)}
.btn-save{padding:6px 14px;border-radius:7px;border:none;background:var(--abel);color:#fff;cursor:pointer;font-size:12px;font-weight:600}
.btn-delete{padding:6px 14px;border-radius:7px;border:none;background:#fee2e2;color:#991f1f;cursor:pointer;font-size:12px;margin-right:auto}

.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#3a2e24;color:#fff;padding:9px 18px;border-radius:18px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200}
.toast.show{opacity:1}

.person-color-mom{color:var(--mom)}.bg-mom{background:var(--mom-light);color:var(--mom-dark)}
.person-color-dad{color:var(--dad)}.bg-dad{background:var(--dad-light);color:var(--dad-dark)}
.person-color-pepijn{color:var(--pepijn)}.bg-pepijn{background:var(--pepijn-light);color:var(--pepijn-dark)}
.person-color-abel{color:var(--abel)}.bg-abel{background:var(--abel-light);color:var(--abel-dark)}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo"><i class="ti ti-home-heart"></i><h1>Family Hub</h1></div>
    <div class="view-tabs">
      <button class="view-tab active" onclick="setView('week')">Week</button>
      <button class="view-tab" onclick="setView('day')">Day</button>
      <button class="view-tab" onclick="setView('month')">Month</button>
    </div>
    <div class="week-nav">
      <button onclick="changePeriod(-1)"><i class="ti ti-chevron-left"></i></button>
      <span class="week-label" id="periodLabel"></span>
      <button onclick="changePeriod(1)"><i class="ti ti-chevron-right"></i></button>
      <button onclick="goToday()" style="font-size:11px;padding:5px 9px">Today</button>
    </div>
    <div class="sync-btns">
      <button class="sync-btn google" id="gBtn" onclick="connectCal('google')"><i class="ti ti-calendar"></i> Google</button>
      <button class="sync-btn outlook" id="oBtn" onclick="connectCal('outlook')"><i class="ti ti-calendar"></i> Outlook</button>
    </div>
    <div class="wake-indicator" id="wakeIndicator">
      <div class="wake-dot" id="wakeDot"></div>
      <span id="wakeLabel">Screen on</span>
    </div>
  </header>

  <div class="main">
    <div class="calendar-area" id="calArea">
      <div class="family-avatars">
        <div class="avatar-chip" style="background:var(--mom-light)"><div class="avatar-dot" style="background:var(--mom)">M</div><span style="color:var(--mom-dark)">Mom</span></div>
        <div class="avatar-chip" style="background:var(--dad-light)"><div class="avatar-dot" style="background:var(--dad)">D</div><span style="color:var(--dad-dark)">Dad</span></div>
        <div class="avatar-chip" style="background:var(--pepijn-light)"><div class="avatar-dot" style="background:var(--pepijn)">P</div><span style="color:var(--pepijn-dark)">Pepijn</span></div>
        <div class="avatar-chip" style="background:var(--abel-light)"><div class="avatar-dot" style="background:var(--abel)">A</div><span style="color:var(--abel-dark)">Abel</span></div>
      </div>
      <div id="calBody"></div>
    </div>
    <div class="sidebar">
      <div class="sidebar-inner">
        <h3><i class="ti ti-checklist"></i> Tasks this week</h3>
        <div id="taskList"></div>
      </div>
      <div style="padding:10px 12px;border-top:1px solid var(--border)">
        <p style="font-size:10px;color:var(--muted);line-height:1.6">Click any cell to add an event. Click a dinner to set the meal &amp; cook.</p>
      </div>
    </div>
  </div>
</div>

<!-- Event modal -->
<div class="modal-overlay" id="eventModal">
  <div class="modal">
    <h2 id="evModalTitle"><i class="ti ti-calendar-plus"></i> Add event</h2>
    <label>Person</label>
    <select id="evPerson">
      <option value="mom">Mom</option><option value="dad">Dad</option>
      <option value="pepijn">Pepijn</option><option value="abel">Abel</option>
    </select>
    <label>Event title</label>
    <input type="text" id="evTitle" placeholder="e.g. Football practice"/>
    <label>Time (optional)</label>
    <input type="text" id="evTime" placeholder="e.g. 15:00 – 16:30"/>
    <label>Sync to Google Calendar?</label>
    <select id="evSync"><option value="yes">Yes – push to person's Google Calendar</option><option value="no">No – local only</option></select>
    <div class="modal-btns">
      <button class="btn-delete" id="evDeleteBtn" onclick="deleteEvent()" style="display:none"><i class="ti ti-trash"></i></button>
      <button class="btn-cancel" onclick="closeModal('eventModal')">Cancel</button>
      <button class="btn-save" onclick="saveEvent()">Save</button>
    </div>
  </div>
</div>

<!-- Dinner modal -->
<div class="modal-overlay" id="dinnerModal">
  <div class="modal">
    <h2><i class="ti ti-soup"></i> Edit dinner</h2>
    <label>Meal</label>
    <input type="text" id="dinnerTitle" placeholder="e.g. Spaghetti bolognese"/>
    <label>Who cooks?</label>
    <select id="dinnerCook">
      <option value="">— no one assigned —</option>
      <option value="mom">Mom</option><option value="dad">Dad</option>
      <option value="pepijn">Pepijn</option><option value="abel">Abel</option>
    </select>
    <div class="modal-btns">
      <button class="btn-delete" onclick="clearDinner()"><i class="ti ti-trash"></i></button>
      <button class="btn-cancel" onclick="closeModal('dinnerModal')">Cancel</button>
      <button class="btn-save" onclick="saveDinner()">Save</button>
    </div>
  </div>
</div>

<!-- Task modal -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <h2><i class="ti ti-circle-plus"></i> Add task</h2>
    <label>Person</label>
    <select id="taskPerson">
      <option value="mom">Mom</option><option value="dad">Dad</option>
      <option value="pepijn">Pepijn</option><option value="abel">Abel</option>
    </select>
    <label>Task</label>
    <input type="text" id="taskTitle" placeholder="e.g. Buy groceries"/>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('taskModal')">Cancel</button>
      <button class="btn-save" onclick="saveTask()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PERSONS=['mom','dad','pepijn','abel'];
const NAMES={mom:'Mom',dad:'Dad',pepijn:'Pepijn',abel:'Abel'};
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const COLORS={mom:'#d4537e',dad:'#378add',pepijn:'#1d9e75',abel:'#ba7517'};

let view='week', weekOffset=0, dayOffset=0, monthOffset=0;
let events={}, dinners={}, tasks={mom:[],dad:[],pepijn:[],abel:[]};
let editingEvent=null, editingDinnerKey=null, editingCell=null;
let wakeLock=null;
let googleConnected=false, outlookConnected=false;
let googleTokens={};

// ── Wake Lock ──────────────────────────────────────────────────────────────
async function requestWakeLock(){
  try{
    if('wakeLock' in navigator){
      wakeLock=await navigator.wakeLock.request('screen');
      document.getElementById('wakeDot').classList.add('active');
      document.getElementById('wakeLabel').textContent='Screen on';
      wakeLock.addEventListener('release',()=>{
        document.getElementById('wakeDot').classList.remove('active');
        document.getElementById('wakeLabel').textContent='Screen off';
      });
    }
  }catch(e){}
}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible') requestWakeLock();
});

// ── Storage ────────────────────────────────────────────────────────────────
async function loadData(){
  try{
    const r=await window.storage.get('familyhub-v2');
    if(r){const d=JSON.parse(r.value);events=d.events||{};dinners=d.dinners||{};tasks=d.tasks||{mom:[],dad:[],pepijn:[],abel:[]};googleConnected=d.googleConnected||false;outlookConnected=d.outlookConnected||false;googleTokens=d.googleTokens||{};}
  }catch(e){}
  seedDefaults();
  if(googleConnected) document.getElementById('gBtn').classList.add('connected');
  if(outlookConnected) document.getElementById('oBtn').classList.add('connected');
  render();
}
async function saveData(){
  try{await window.storage.set('familyhub-v2',JSON.stringify({events,dinners,tasks,googleConnected,outlookConnected,googleTokens}));}catch(e){}
}

function seedDefaults(){
  const w=getWeekDates(0);
  const fmt=d=>d.toISOString().slice(0,10);
  [{p:'mom',d:0,t:'Yoga class',ti:'09:00'},{p:'dad',d:0,t:'Work meeting',ti:'10:30'},{p:'pepijn',d:1,t:'Football practice',ti:'16:00'},{p:'abel',d:2,t:'Art class',ti:'14:00'},{p:'mom',d:3,t:'Book club',ti:'19:00'},{p:'dad',d:4,t:'Gym',ti:'07:00'}].forEach(ev=>{
    const k=fmt(w[ev.d]);
    if(!events[k])events[k]=[];
    if(!events[k].find(e=>e.title===ev.t&&e.person===ev.p))events[k].push({id:uid(),person:ev.p,title:ev.t,time:ev.ti,synced:false});
  });
  [[0,'Pasta carbonara','mom'],[1,'Chicken stir fry','dad'],[2,'Homemade pizza',''],[4,'Fish & chips','pepijn'],[6,'Sunday roast','dad']].forEach(([di,meal,cook])=>{
    const k=fmt(w[di]);if(!dinners[k])dinners[k]={meal,cook};
  });
  if(!tasks.mom.length)tasks.mom=[{id:uid(),text:'Call dentist',done:false},{id:uid(),text:'Grocery shopping',done:true}];
  if(!tasks.dad.length)tasks.dad=[{id:uid(),text:'Fix bike',done:false}];
  if(!tasks.pepijn.length)tasks.pepijn=[{id:uid(),text:'Homework math',done:false}];
  if(!tasks.abel.length)tasks.abel=[{id:uid(),text:'Clean room',done:false}];
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}

// ── Date helpers ───────────────────────────────────────────────────────────
function getWeekDates(off){
  const now=new Date(),day=now.getDay(),mon=new Date(now);
  mon.setDate(now.getDate()-(day===0?6:day-1)+off*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function getDayDate(off){const d=new Date();d.setDate(d.getDate()+off);return d;}
function getMonthDates(off){
  const now=new Date(),y=now.getFullYear(),m=now.getMonth()+off;
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  const start=new Date(first);start.setDate(first.getDate()-(first.getDay()===0?6:first.getDay()-1));
  const end=new Date(last);const ld=last.getDay();end.setDate(last.getDate()+(ld===0?0:7-ld));
  const dates=[];let cur=new Date(start);
  while(cur<=end){dates.push(new Date(cur));cur.setDate(cur.getDate()+1);}
  return{dates,month:new Date(y,m,1)};
}
function iso(d){return d.toISOString().slice(0,10)}
function isToday(d){const t=new Date();return d.getDate()===t.getDate()&&d.getMonth()===t.getMonth()&&d.getFullYear()===t.getFullYear()}

// ── View switcher ──────────────────────────────────────────────────────────
function setView(v){
  view=v;
  document.querySelectorAll('.view-tab').forEach((t,i)=>{t.classList.toggle('active',['week','day','month'][i]===v)});
  render();
}
function changePeriod(d){
  if(view==='week')weekOffset+=d;
  else if(view==='day')dayOffset+=d;
  else monthOffset+=d;
  render();
}
function goToday(){weekOffset=0;dayOffset=0;monthOffset=0;render()}

// ── Render dispatcher ──────────────────────────────────────────────────────
function render(){
  if(view==='week')renderWeek();
  else if(view==='day')renderDay();
  else renderMonth();
  renderTasks();
}

// ── Week view ──────────────────────────────────────────────────────────────
function renderWeek(){
  const dates=getWeekDates(weekOffset);
  const opts={month:'short',day:'numeric'};
  document.getElementById('periodLabel').textContent=dates[0].toLocaleDateString('en-GB',opts)+' – '+dates[6].toLocaleDateString('en-GB',opts);

function goToDay(isoStr){
  const target=new Date(isoStr);const today=new Date();
  dayOffset=Math.round((target-today)/(1000*60*60*24));
  setView('day');
}

// ── Modals ─────────────────────────────────────────────────────────────────
function openEventModal(person,dateKey,e){
  if(e)e.stopPropagation();
  editingEvent=null;editingCell={person,dateKey};
  document.getElementById('evPerson').value=person;
  document.getElementById('evTitle').value='';
  document.getElementById('evTime').value='';
  document.getElementById('evSync').value=googleConnected?'yes':'no';
  document.getElementById('evDeleteBtn').style.display='none';
  document.getElementById('evModalTitle').innerHTML=`<i class='ti ti-calendar-plus'></i> Add event`;
  document.getElementById('eventModal').classList.add('open');
  setTimeout(()=>document.getElementById('evTitle').focus(),100);
}

function editEvent(e,evId,dateKey){
  e.stopPropagation();
  const ev=(events[dateKey]||[]).find(x=>x.id===evId);if(!ev)return;
  editingEvent={evId,dateKey};editingCell=null;
  document.getElementById('evPerson').value=ev.person;
  document.getElementById('evTitle').value=ev.title;
  document.getElementById('evTime').value=ev.time||'';
  document.getElementById('evSync').value='no';
  document.getElementById('evDeleteBtn').style.display='block';
  document.getElementById('evModalTitle').innerHTML=`<i class='ti ti-pencil'></i> Edit event`;
  document.getElementById('eventModal').classList.add('open');
}

function saveEvent(){
  const person=document.getElementById('evPerson').value;
  const title=document.getElementById('evTitle').value.trim();
  const time=document.getElementById('evTime').value.trim();
  const doSync=document.getElementById('evSync').value==='yes';
  if(!title)return;

  if(editingEvent){
    const ev=(events[editingEvent.dateKey]||[]).find(x=>x.id===editingEvent.evId);
    if(ev){ev.person=person;ev.title=title;ev.time=time;}
  }else{
    const k=editingCell.dateKey;
    if(!events[k])events[k]=[];
    const newEv={id:uid(),person,title,time,synced:false};
    events[k].push(newEv);
    if(doSync&&googleConnected) pushToGoogleCalendar(newEv,editingCell.dateKey);
  }
  saveData();closeModal('eventModal');render();toast('Event saved'+(doSync&&googleConnected?' & synced to Google':''));
}

function deleteEvent(){
  const{evId,dateKey}=editingEvent;
  events[dateKey]=(events[dateKey]||[]).filter(x=>x.id!==evId);
  saveData();closeModal('eventModal');render();toast('Event deleted');
}

function openDinnerModal(key){
  editingDinnerKey=key;
  const dn=dinners[key]||{};
  document.getElementById('dinnerTitle').value=dn.meal||'';
  document.getElementById('dinnerCook').value=dn.cook||'';
  document.getElementById('dinnerModal').classList.add('open');
  setTimeout(()=>document.getElementById('dinnerTitle').focus(),100);
}
function saveDinner(){
  const meal=document.getElementById('dinnerTitle').value.trim();
  const cook=document.getElementById('dinnerCook').value;
  if(meal)dinners[editingDinnerKey]={meal,cook};
  else delete dinners[editingDinnerKey];
  saveData();closeModal('dinnerModal');render();toast('Dinner updated');
}
function clearDinner(){
  delete dinners[editingDinnerKey];
  saveData();closeModal('dinnerModal');render();toast('Dinner cleared');
}

function openTaskModal(person){
  document.getElementById('taskPerson').value=person;
  document.getElementById('taskTitle').value='';
  document.getElementById('taskModal').classList.add('open');
  setTimeout(()=>document.getElementById('taskTitle').focus(),100);
}
function saveTask(){
  const person=document.getElementById('taskPerson').value;
  const text=document.getElementById('taskTitle').value.trim();
  if(!text)return;
  if(!tasks[person])tasks[person]=[];
  tasks[person].push({id:uid(),text,done:false});
  saveData();closeModal('taskModal');renderTasks();toast('Task added');
}
function toggleTask(person,id){
  const t=(tasks[person]||[]).find(x=>x.id===id);
  if(t){t.done=!t.done;saveData();renderTasks();}
}

function closeModal(id){
  document.getElementById(id).classList.remove('open');
  editingEvent=null;editingCell=null;editingDinnerKey=null;
}
document.querySelectorAll('.modal-overlay').forEach(m=>{
  m.addEventListener('click',e=>{if(e.target===m)closeModal(m.id)});
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')document.querySelectorAll('.modal-overlay.open').forEach(m=>closeModal(m.id));
  if(e.key==='Enter'){
    if(document.getElementById('eventModal').classList.contains('open'))saveEvent();
    else if(document.getElementById('dinnerModal').classList.contains('open'))saveDinner();
    else if(document.getElementById('taskModal').classList.contains('open'))saveTask();
  }
});

// ── Google Calendar OAuth & sync ───────────────────────────────────────────
const GC_CLIENT_ID='257428760398-kjasg5e6igshq124tpr55l5494h6rg9a.apps.googleusercontent.com';
const GC_SCOPE='https://www.googleapis.com/auth/calendar.events';
const MS_CLIENT_ID='YOUR_MICROSOFT_CLIENT_ID';

function connectCal(type){
  if(type==='google'){
    if(googleConnected){toast('Google Calendar already connected');return;}
    const params=new URLSearchParams({
      client_id:GC_CLIENT_ID,
      redirect_uri:'https://wmluitse-ai21.github.io/family-hub',
      response_type:'token',
      scope:GC_SCOPE,
      prompt:'consent',
      include_granted_scopes:'true'
    });
    window.location.href='https://accounts.google.com/o/oauth2/auth?'+params.toString();
  } else {
    if(outlookConnected){toast('Outlook already connected');return;}
    toast('Outlook sync coming soon — add your Azure Client ID in the code.');
  }
}

function handleOAuthCallback(){
  const hash=window.location.hash;
  if(!hash) return;
  const params=new URLSearchParams(hash.replace('#',''));
  const token=params.get('access_token');
  const error=params.get('error');
  if(error){toast('Google login failed: '+error);return;}
  if(token){
    googleTokens.access_token=token;
    googleTokens.expires_at=Date.now()+(parseInt(params.get('expires_in')||3600)*1000);
    googleConnected=true;
    document.getElementById('gBtn').classList.add('connected');
    document.getElementById('gBtn').innerHTML=`<i class='ti ti-check'></i> Google ✓`;
    window.history.replaceState(null,null,window.location.pathname);
    saveData();
    toast('✅ Google Calendar connected!');
    fetchGoogleEvents();
  }
}

async function fetchGoogleEvents(){
  if(!googleConnected||!googleTokens.access_token) return;
  const dates=getWeekDates(weekOffset);
  const timeMin=dates[0].toISOString();
  const timeMax=dates[6].toISOString();
  for(const person of PERSONS){
    const calId=getCalendarIdForPerson(person);
    try{
      const r=await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events?timeMin=${timeMin}&timeMax=${timeMax}&singleEvents=true&orderBy=startTime`,{
        headers:{'Authorization':'Bearer '+googleTokens.access_token}
      });
      if(!r.ok) continue;
      const data=await r.json();
      (data.items||[]).forEach(item=>{
        const dateStr=(item.start.date||item.start.dateTime||'').slice(0,10);
        if(!dateStr) return;
        if(!events[dateStr]) events[dateStr]=[];
        if(!events[dateStr].find(e=>e.gcalId===item.id)){
          events[dateStr].push({
            id:uid(),gcalId:item.id,person,
            title:item.summary||'(no title)',
            time:item.start.dateTime?item.start.dateTime.slice(11,16):'',
            synced:true
          });
        }
      });
    }catch(e){}
  }
  saveData();render();toast('Google Calendar events loaded!');
}

async function pushToGoogleCalendar(ev, dateKey){
  if(!googleConnected||!googleTokens.access_token)return;
  const calId=getCalendarIdForPerson(ev.person);
  const[y,m,d]=dateKey.split('-').map(Number);
  const body={summary:ev.title,start:{date:dateKey},end:{date:dateKey}};
  if(ev.time){
    const[hh,mm]=(ev.time.split('–')[0]||ev.time).trim().split(':').map(Number);
    body.start={dateTime:`${dateKey}T${String(hh).padStart(2,'0')}:${String(mm||0).padStart(2,'0')}:00`};
    body.end={dateTime:`${dateKey}T${String(hh+1).padStart(2,'0')}:${String(mm||0).padStart(2,'0')}:00`};
  }
  try{
    const r=await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calId)}/events`,{
      method:'POST',headers:{'Authorization':'Bearer '+googleTokens.access_token,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(r.ok){ev.synced=true;toast('Pushed to '+NAMES[ev.person]+"'s Google Calendar");}
  }catch(e){}
}

function getCalendarIdForPerson(person){
  // Replace with each family member's Google Calendar ID (their email)
  const ids={mom:'w.m.luitse@gmail.com',dad:'t.h.rodenburg@gmail.com',pepijn:'pepijn.simen.rodenburg@gmail.com',abel:'abel.david.rodenburg@gmail.com'};
  return ids[person]||'primary';
}

function trunc(s,n){return s&&s.length>n?s.slice(0,n-1)+'…':s}
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}
