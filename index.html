<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Familie Hub</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#fdf8f3;color:#3a2e24;min-height:100vh;overflow:hidden}
:root{
  --mom:#d4537e;--mom-light:#fbeaf0;--mom-dark:#72243e;
  --dad:#378add;--dad-light:#e6f1fb;--dad-dark:#0c447c;
  --pepijn:#1d9e75;--pepijn-light:#e1f5ee;--pepijn-dark:#085041;
  --abel:#ba7517;--abel-light:#faeeda;--abel-dark:#633806;
  --bg:#fdf8f3;--card:#fffcf8;--border:#ede5d8;--text:#3a2e24;--muted:#8a7a6a
}
.app{display:flex;flex-direction:column;height:100vh}
header{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px}
.logo i{font-size:20px;color:var(--abel)}
.logo h1{font-size:16px;font-weight:600}
.view-tabs{display:flex;background:#f0e9df;border-radius:8px;padding:3px;gap:2px}
.view-tab{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--muted)}
.view-tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.week-nav{display:flex;align-items:center;gap:6px;margin-left:auto}
.week-nav button{background:none;border:1px solid var(--border);border-radius:7px;padding:5px 9px;cursor:pointer;color:var(--text);font-size:12px}
.week-label{font-size:12px;font-weight:500;min-width:140px;text-align:center}
.hdr-btn{display:flex;align-items:center;gap:5px;font-size:11px;padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;font-weight:600;color:var(--text)}
.hdr-btn.google{border-color:#ea4335;color:#ea4335}
.hdr-btn.google.connected{border-color:#1d9e75;color:#1d9e75;background:var(--pepijn-light)}
.hdr-btn.refresh{border-color:var(--dad);color:var(--dad)}
.wake-dot{width:7px;height:7px;border-radius:50%;background:#ccc;display:inline-block;margin-right:3px}
.wake-dot.active{background:#1d9e75}
.sync-status{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:3px}

.main{flex:1;display:flex;overflow:hidden}
.calendar-area{flex:1;overflow:auto;padding:12px}
.sidebar{width:215px;border-left:1px solid var(--border);background:var(--card);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sidebar-inner{flex:1;overflow-y:auto;padding:12px}
.sidebar h3{font-size:12px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:5px}

.family-avatars{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.avatar-chip{display:flex;align-items:center;gap:5px;padding:4px 10px 4px 4px;border-radius:20px;font-size:11px;font-weight:600}
.avatar-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff}

.grid-wrapper{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.day-headers{display:grid;grid-template-columns:72px repeat(7,1fr);border-bottom:1px solid var(--border)}
.day-header{padding:8px 6px;text-align:center;font-size:11px;font-weight:600;color:var(--muted)}
.day-header.today{background:var(--abel-light);color:var(--abel-dark)}
.day-header span{display:block;font-size:16px;font-weight:700;color:var(--text)}
.day-header.today span{color:var(--abel)}
.row-label{padding:6px 8px;display:flex;align-items:flex-start;gap:5px;border-right:1px solid var(--border);background:var(--bg)}
.row-label .dot{width:9px;height:9px;border-radius:50%;margin-top:3px;flex-shrink:0}
.row-label .name{font-size:10px;font-weight:600}
.person-row{display:grid;grid-template-columns:72px repeat(7,1fr);border-bottom:1px solid var(--border);min-height:64px}
.person-row:last-child{border-bottom:none}
.day-cell{border-right:.5px solid var(--border);padding:4px;min-height:64px;display:flex;flex-direction:column;gap:2px;cursor:pointer;transition:background .1s}
.day-cell:hover{background:#fdf5ec}
.day-cell:last-child{border-right:none}
.day-cell.today-col{background:rgba(186,117,23,.04)}
.event-chip{border-radius:4px;padding:2px 5px;font-size:9px;font-weight:500;display:flex;align-items:center;gap:2px;line-height:1.4;cursor:pointer}
.event-chip.gcal{border-left:2px solid rgba(0,0,0,.2)}
.add-btn{opacity:0;font-size:14px;color:var(--muted);cursor:pointer;margin-top:auto;align-self:flex-end;border:none;background:none;padding:1px 3px;line-height:1}
.day-cell:hover .add-btn{opacity:1}

.dinner-row{display:grid;grid-template-columns:72px repeat(7,1fr);background:#fff9f0;border-top:2px solid var(--border)}
.dinner-label{padding:6px 8px;border-right:1px solid var(--border);display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--abel-dark)}
.dinner-cell{border-right:.5px solid var(--border);padding:5px;cursor:pointer;display:flex;flex-direction:column;gap:2px;min-height:52px}
.dinner-cell:hover{background:var(--abel-light)}
.dinner-cell:last-child{border-right:none}
.dinner-cell.today-col{background:rgba(186,117,23,.05)}
.meal{font-size:10px;color:var(--text);font-weight:500;line-height:1.3}
.no-meal{font-size:9px;color:var(--muted);font-style:italic}
.cook-badge{display:inline-flex;align-items:center;gap:3px;border-radius:10px;padding:1px 5px;font-size:9px;font-weight:600}

/* Day view */
.day-view-grid{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.day-col-hdr{padding:10px 8px;text-align:center;font-size:11px;font-weight:700;border-right:.5px solid var(--border)}
.day-col-hdr:last-child{border-right:none}
.day-view-row{display:grid;border-bottom:.5px solid var(--border);min-height:60px}
.day-view-label{padding:6px 8px;border-right:1px solid var(--border);font-size:10px;font-weight:600;display:flex;align-items:center;gap:4px;background:var(--bg);flex-shrink:0}
.day-view-cell{border-right:.5px solid var(--border);padding:5px;display:flex;flex-direction:column;gap:3px;cursor:pointer;min-height:60px}
.day-view-cell:hover{background:#fdf5ec}
.day-view-cell:last-child{border-right:none}

/* Month view */
.month-grid{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.month-weekdays{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)}
.month-weekday{padding:7px;text-align:center;font-size:11px;font-weight:600;color:var(--muted)}
.month-cells{display:grid;grid-template-columns:repeat(7,1fr)}
.month-cell{border-right:.5px solid var(--border);border-bottom:.5px solid var(--border);padding:5px;min-height:80px;cursor:pointer;transition:background .1s}
.month-cell:hover{background:#fdf5ec}
.month-cell.other-month{opacity:.4}
.month-cell.today-col{background:rgba(186,117,23,.06)}
.month-day-num{font-size:12px;font-weight:600;margin-bottom:3px}
.month-cell.today-col .month-day-num{color:var(--abel);background:var(--abel-light);width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.month-ev-chip{font-size:8px;border-radius:3px;padding:1px 4px;font-weight:500;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:1px}
.month-dinner{font-size:8px;color:var(--abel-dark);background:var(--abel-light);border-radius:3px;padding:1px 4px;margin-top:2px;display:flex;align-items:center;gap:2px}

/* Tasks */
.task-person{margin-bottom:10px}
.task-person-hdr{display:flex;align-items:center;gap:5px;margin-bottom:4px;font-size:10px;font-weight:700}
.task-item{display:flex;align-items:flex-start;gap:5px;margin-bottom:3px;padding:3px 5px;border-radius:5px;cursor:pointer}
.task-item:hover{background:var(--bg)}
.task-check{width:13px;height:13px;border-radius:3px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.task-check.done{background:var(--pepijn);border-color:var(--pepijn)}
.task-check.done i{font-size:8px;color:#fff}
.task-text{font-size:10px;line-height:1.4}
.task-text.done{text-decoration:line-through;color:var(--muted)}
.add-task-btn{font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer;padding:2px 3px;display:flex;align-items:center;gap:2px}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(58,46,36,.35);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:14px;padding:18px;width:320px;border:1px solid var(--border)}
.modal h2{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.modal label{display:block;font-size:11px;color:var(--muted);margin-bottom:3px;margin-top:9px;font-weight:500}
.modal input,.modal select{width:100%;padding:7px 9px;border-radius:7px;border:1px solid var(--border);background:var(--bg);font-size:12px;color:var(--text);outline:none}
.modal input:focus,.modal select:focus{border-color:var(--abel)}
.modal-btns{display:flex;gap:7px;margin-top:14px;justify-content:flex-end}
.btn-cancel{padding:6px 14px;border-radius:7px;border:1px solid var(--border);background:none;cursor:pointer;font-size:12px;color:var(--muted)}
.btn-save{padding:6px 14px;border-radius:7px;border:none;background:var(--abel);color:#fff;cursor:pointer;font-size:12px;font-weight:600}
.btn-delete{padding:6px 14px;border-radius:7px;border:none;background:#fee2e2;color:#991f1f;cursor:pointer;font-size:12px;margin-right:auto}
.gcal-badge{font-size:9px;background:var(--dad-light);color:var(--dad-dark);border-radius:8px;padding:2px 7px;margin-left:auto}

.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#3a2e24;color:#fff;padding:9px 18px;border-radius:18px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200}
.toast.show{opacity:1}

.person-color-mom{color:var(--mom)}.bg-mom{background:var(--mom-light);color:var(--mom-dark)}
.person-color-dad{color:var(--dad)}.bg-dad{background:var(--dad-light);color:var(--dad-dark)}
.person-color-pepijn{color:var(--pepijn)}.bg-pepijn{background:var(--pepijn-light);color:var(--pepijn-dark)}
.person-color-abel{color:var(--abel)}.bg-abel{background:var(--abel-light);color:var(--abel-dark)}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo"><i class="ti ti-home-heart"></i><h1>Familie Hub</h1></div>
    <div class="view-tabs">
      <button class="view-tab active" onclick="setView('week')">Week</button>
      <button class="view-tab" onclick="setView('day')">Dag</button>
      <button class="view-tab" onclick="setView('month')">Maand</button>
    </div>
    <div class="week-nav">
      <button onclick="changePeriod(-1)"><i class="ti ti-chevron-left"></i></button>
      <span class="week-label" id="periodLabel"></span>
      <button onclick="changePeriod(1)"><i class="ti ti-chevron-right"></i></button>
      <button onclick="goToday()" style="font-size:11px;padding:5px 9px">Vandaag</button>
    </div>
    <button class="hdr-btn google" id="gcalBtn" onclick="connectGoogle()">
      <i class="ti ti-calendar"></i><span id="gcalLbl">Google Agenda</span>
    </button>
    <button class="hdr-btn refresh" onclick="manualRefresh()"><i class="ti ti-refresh"></i> Vernieuwen</button>
    <div class="sync-status"><div class="wake-dot" id="wakeDot"></div><span id="syncLbl">Laden…</span></div>
  </header>

  <div class="main">
    <div class="calendar-area">
      <div class="family-avatars">
        <div class="avatar-chip" style="background:var(--mom-light)"><div class="avatar-dot" style="background:var(--mom)">M</div><span style="color:var(--mom-dark)">Mama</span></div>
        <div class="avatar-chip" style="background:var(--dad-light)"><div class="avatar-dot" style="background:var(--dad)">D</div><span style="color:var(--dad-dark)">Papa</span></div>
        <div class="avatar-chip" style="background:var(--pepijn-light)"><div class="avatar-dot" style="background:var(--pepijn)">P</div><span style="color:var(--pepijn-dark)">Pepijn</span></div>
        <div class="avatar-chip" style="background:var(--abel-light)"><div class="avatar-dot" style="background:var(--abel)">A</div><span style="color:var(--abel-dark)">Abel</span></div>
      </div>
      <div id="calBody"></div>
    </div>
    <div class="sidebar">
      <div class="sidebar-inner">
        <h3><i class="ti ti-checklist" style="color:var(--muted)"></i> Taken deze week</h3>
        <div id="taskList"></div>
      </div>
      <div style="padding:10px 12px;border-top:1px solid var(--border)">
        <p style="font-size:10px;color:var(--muted);line-height:1.6">Klik op een cel voor een afspraak. Klik op een afspraak om te bewerken. Klik op het diner om de maaltijd in te stellen.</p>
      </div>
    </div>
  </div>
</div>

<!-- Afspraak modal -->
<div class="modal-overlay" id="eventModal">
  <div class="modal">
    <h2 id="evTitle_hdr"><i class="ti ti-calendar-plus"></i> Afspraak toevoegen <span class="gcal-badge" id="gcalBadge" style="display:none">Google Agenda</span></h2>
    <label>Persoon</label>
    <select id="evPerson">
      <option value="mom">Mama</option><option value="dad">Papa</option>
      <option value="pepijn">Pepijn</option><option value="abel">Abel</option>
    </select>
    <label>Titel</label>
    <input type="text" id="evTitle" placeholder="bijv. Voetbaltraining"/>
    <label>Tijd (optioneel)</label>
    <input type="text" id="evTime" placeholder="bijv. 15:00 – 16:30"/>
    <label id="evSyncLabel">Synchroniseren met Google Agenda?</label>
    <select id="evSync"><option value="yes">Ja – naar Google Agenda sturen</option><option value="no">Nee – alleen lokaal</option></select>
    <div class="modal-btns">
      <button class="btn-delete" id="evDeleteBtn" onclick="deleteEvent()" style="display:none"><i class="ti ti-trash"></i> Verwijderen</button>
      <button class="btn-cancel" onclick="closeModal('eventModal')">Annuleren</button>
      <button class="btn-save" onclick="saveEvent()">Opslaan</button>
    </div>
  </div>
</div>

<!-- Diner modal -->
<div class="modal-overlay" id="dinnerModal">
  <div class="modal">
    <h2><i class="ti ti-soup"></i> Diner bewerken</h2>
    <label>Maaltijd</label>
    <input type="text" id="dinnerTitle" placeholder="bijv. Spaghetti bolognese"/>
    <label>Wie kookt?</label>
    <select id="dinnerCook">
      <option value="">— niemand toegewezen —</option>
      <option value="mom">Mama</option><option value="dad">Papa</option>
      <option value="pepijn">Pepijn</option><option value="abel">Abel</option>
    </select>
    <div class="modal-btns">
      <button class="btn-delete" onclick="clearDinner()"><i class="ti ti-trash"></i></button>
      <button class="btn-cancel" onclick="closeModal('dinnerModal')">Annuleren</button>
      <button class="btn-save" onclick="saveDinner()">Opslaan</button>
    </div>
  </div>
</div>

<!-- Taak modal -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <h2><i class="ti ti-circle-plus"></i> Taak toevoegen</h2>
    <label>Persoon</label>
    <select id="taskPerson">
      <option value="mom">Mama</option><option value="dad">Papa</option>
      <option value="pepijn">Pepijn</option><option value="abel">Abel</option>
    </select>
    <label>Taak</label>
    <input type="text" id="taskTitle" placeholder="bijv. Boodschappen doen"/>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('taskModal')">Annuleren</button>
      <button class="btn-save" onclick="saveTask()">Opslaan</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PERSONS=['mom','dad','pepijn','abel'];
const NAMES={mom:'Mama',dad:'Papa',pepijn:'Pepijn',abel:'Abel'};
const CALIDS={mom:'w.m.luitse@gmail.com',dad:'t.h.rodenburg@gmail.com',pepijn:'pepijn.simen.rodenburg@gmail.com',abel:'abel.david.rodenburg@gmail.com'};
const LOGIN_HINT='w.m.luitse@gmail.com';
const DAYS=['Ma','Di','Wo','Do','Vr','Za','Zo'];
const GC_CLIENT_ID='627008811393-13b2slc834l95793c607ch70l43cvk3t.apps.googleusercontent.com';
const GC_SCOPE='https://www.googleapis.com/auth/calendar.events';
const REDIRECT_URI='https://wmluitse-ai21.github.io/family-hub/';

let view='week',weekOffset=0,dayOffset=0,monthOffset=0;
let events={},dinners={},tasks={mom:[],dad:[],pepijn:[],abel:[]};
let editingEvent=null,editingDinnerKey=null,editingCell=null;
let gcalToken=null,gcalExpiry=0;
let pollTimer=null;

// ── Wake Lock ──────────────────────────────────────────────────────────────
async function requestWakeLock(){
  try{if('wakeLock' in navigator){const wl=await navigator.wakeLock.request('screen');document.getElementById('wakeDot').classList.add('active');wl.addEventListener('release',()=>document.getElementById('wakeDot').classList.remove('active'));}}catch(e){}
}
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'){requestWakeLock();loadShared();}});

// ── Shared storage ─────────────────────────────────────────────────────────
async function loadShared(){
  setSyncLbl('Laden…');
  try{
    const[re,rd,rt,rg]=await Promise.all([
      window.storage.get('fh-events',true),
      window.storage.get('fh-dinners',true),
      window.storage.get('fh-tasks',true),
      window.storage.get('fh-gcal',false)
    ]);
    if(re)events=JSON.parse(re.value);
    if(rd)dinners=JSON.parse(rd.value);
    if(rt){const t=JSON.parse(rt.value);tasks={mom:t.mom||[],dad:t.dad||[],pepijn:t.pepijn||[],abel:t.abel||[]};}
    if(rg){const g=JSON.parse(rg.value);gcalToken=g.token||null;gcalExpiry=g.expiry||0;}
  }catch(e){}
  updateGcalBtn();
  setSyncLbl('Gesynchroniseerd');
  render();
}

async function saveShared(){
  setSyncLbl('Opslaan…');
  try{
    await Promise.all([
      window.storage.set('fh-events',JSON.stringify(events),true),
      window.storage.set('fh-dinners',JSON.stringify(dinners),true),
      window.storage.set('fh-tasks',JSON.stringify(tasks),true)
    ]);
  }catch(e){}
  setSyncLbl('Gesynchroniseerd');
  render();
}

function setSyncLbl(t){document.getElementById('syncLbl').textContent=t;}
function startPolling(){if(pollTimer)clearInterval(pollTimer);pollTimer=setInterval(()=>loadShared(),20000);}
async function manualRefresh(){setSyncLbl('Vernieuwen…');await loadShared();if(isGcalConnected())await fetchAllGcalEvents();toast('Vernieuwd ✓');}

// ── Google Calendar OAuth ──────────────────────────────────────────────────
function isGcalConnected(){return !!(gcalToken&&gcalExpiry>Date.now())}
function updateGcalBtn(){
  const btn=document.getElementById('gcalBtn'),lbl=document.getElementById('gcalLbl');
  if(isGcalConnected()){btn.classList.add('connected');lbl.textContent='Agenda ✓';}
  else{btn.classList.remove('connected');lbl.textContent='Google Agenda';}
}
function connectGoogle(){
  if(isGcalConnected()){toast('Google Agenda is al gekoppeld');return;}
  sessionStorage.setItem('gcal_pending','1');
  const p=new URLSearchParams({client_id:GC_CLIENT_ID,redirect_uri:REDIRECT_URI,response_type:'token',scope:GC_SCOPE,prompt:'consent',login_hint:LOGIN_HINT});
  window.location.href='https://accounts.google.com/o/oauth2/auth?'+p.toString();
}
function handleOAuthCallback(){
  const hash=window.location.hash;
  if(!hash||!sessionStorage.getItem('gcal_pending'))return;
  const p=new URLSearchParams(hash.replace('#',''));
  const token=p.get('access_token');if(!token)return;
  sessionStorage.removeItem('gcal_pending');
  gcalToken=token;gcalExpiry=Date.now()+(parseInt(p.get('expires_in')||3600)*1000);
  window.history.replaceState(null,null,window.location.pathname);
  try{window.storage.set('fh-gcal',JSON.stringify({token:gcalToken,expiry:gcalExpiry}),false);}catch(e){}
  updateGcalBtn();toast('✅ Google Agenda gekoppeld!');
  fetchAllGcalEvents();
}

// ── Fetch ALL Google Calendar events (full year) ───────────────────────────
async function fetchAllGcalEvents(){
  if(!isGcalConnected())return;
  setSyncLbl('Agenda ophalen…');
  // 3 months back, 9 months forward = ~1 year
  const timeMin=new Date();timeMin.setMonth(timeMin.getMonth()-3);timeMin.setHours(0,0,0,0);
  const timeMax=new Date();timeMax.setMonth(timeMax.getMonth()+9);timeMax.setHours(23,59,59,999);

  // Remove all old gcal events in this range
  const cur=new Date(timeMin);
  while(cur<=timeMax){
    const k=iso(cur);
    if(events[k])events[k]=events[k].filter(e=>!e.fromGcal);
    cur.setDate(cur.getDate()+1);
  }

  for(const p of PERSONS){
    let pageToken=null;
    do{
      try{
        const params=new URLSearchParams({
          timeMin:timeMin.toISOString(),timeMax:timeMax.toISOString(),
          singleEvents:'true',orderBy:'startTime',maxResults:'2500'
        });
        if(pageToken)params.set('pageToken',pageToken);
        const r=await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALIDS[p])}/events?${params}`,{
          headers:{'Authorization':'Bearer '+gcalToken}
        });
        if(r.status===401){gcalToken=null;gcalExpiry=0;try{window.storage.set('fh-gcal',JSON.stringify({token:null,expiry:0}),false);}catch(e){}updateGcalBtn();toast('Google sessie verlopen — opnieuw inloggen');return;}
        if(!r.ok){pageToken=null;break;}
        const data=await r.json();
        (data.items||[]).forEach(item=>{
          const dateStr=(item.start.date||item.start.dateTime||'').slice(0,10);
          if(!dateStr)return;
          if(!events[dateStr])events[dateStr]=[];
          if(!events[dateStr].find(e=>e.gcalId===item.id)){
            events[dateStr].push({
              id:uid(),gcalId:item.id,gcalCalId:CALIDS[p],person:p,fromGcal:true,
              title:item.summary||'(geen titel)',
              time:item.start.dateTime?item.start.dateTime.slice(11,16):'',
              endTime:item.end&&item.end.dateTime?item.end.dateTime.slice(11,16):'',
              synced:true
            });
          }
        });
        pageToken=data.nextPageToken||null;
      }catch(e){pageToken=null;}
    }while(pageToken);
  }
  await saveShared();
  setSyncLbl('Gesynchroniseerd');
}

// ── Push new event to Google Calendar ─────────────────────────────────────
async function pushToGcal(ev,dateKey){
  if(!isGcalConnected())return null;
  const body={summary:ev.title,start:{date:dateKey},end:{date:dateKey}};
  if(ev.time){
    const[hh,mm]=(ev.time.split('–')[0]||ev.time).trim().split(':').map(Number);
    const pad=n=>String(n).padStart(2,'0');
    const endH=ev.endTime?parseInt(ev.endTime.split(':')[0]):hh+1;
    const endM=ev.endTime?parseInt(ev.endTime.split(':')[1]):mm||0;
    body.start={dateTime:`${dateKey}T${pad(hh)}:${pad(mm||0)}:00`};
    body.end={dateTime:`${dateKey}T${pad(endH)}:${pad(endM)}:00`};
  }
  try{
    const r=await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALIDS[ev.person])}/events`,{
      method:'POST',headers:{'Authorization':'Bearer '+gcalToken,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(r.ok){const d=await r.json();return d.id;}
  }catch(e){}
  return null;
}

// ── Update existing Google Calendar event ─────────────────────────────────
async function updateGcalEvent(ev,dateKey){
  if(!isGcalConnected()||!ev.gcalId)return;
  const body={summary:ev.title,start:{date:dateKey},end:{date:dateKey}};
  if(ev.time){
    const[hh,mm]=(ev.time.split('–')[0]||ev.time).trim().split(':').map(Number);
    const pad=n=>String(n).padStart(2,'0');
    const endH=ev.endTime?parseInt(ev.endTime.split(':')[0]):hh+1;
    const endM=ev.endTime?parseInt(ev.endTime.split(':')[1]):mm||0;
    body.start={dateTime:`${dateKey}T${pad(hh)}:${pad(mm||0)}:00`};
    body.end={dateTime:`${dateKey}T${pad(endH)}:${pad(endM)}:00`};
  }
  try{
    await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALIDS[ev.person])}/events/${ev.gcalId}`,{
      method:'PATCH',headers:{'Authorization':'Bearer '+gcalToken,'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
  }catch(e){}
}

// ── Delete Google Calendar event ───────────────────────────────────────────
async function deleteGcalEvent(ev){
  if(!isGcalConnected()||!ev.gcalId)return;
  try{
    await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALIDS[ev.person])}/events/${ev.gcalId}`,{
      method:'DELETE',headers:{'Authorization':'Bearer '+gcalToken}
    });
  }catch(e){}
}

// ── Date helpers ───────────────────────────────────────────────────────────
function getWeekDates(off){
  const now=new Date(),day=now.getDay(),mon=new Date(now);
  mon.setDate(now.getDate()-(day===0?6:day-1)+off*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function getDayDate(off){const d=new Date();d.setDate(d.getDate()+off);return d;}
function getMonthDates(off){
  const now=new Date(),y=now.getFullYear(),m=now.getMonth()+off;
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  const start=new Date(first);start.setDate(first.getDate()-(first.getDay()===0?6:first.getDay()-1));
  const end=new Date(last);const ld=last.getDay();end.setDate(last.getDate()+(ld===0?0:7-ld));
  const dates=[];let cur=new Date(start);
  while(cur<=end){dates.push(new Date(cur));cur.setDate(cur.getDate()+1);}
  return{dates,month:new Date(y,m,1)};
}
function iso(d){return d.toISOString().slice(0,10)}
function isToday(d){const t=new Date();return d.getDate()===t.getDate()&&d.getMonth()===t.getMonth()&&d.getFullYear()===t.getFullYear()}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}

// ── View management ────────────────────────────────────────────────────────
function setView(v){
  view=v;
  document.querySelectorAll('.view-tab').forEach((t,i)=>t.classList.toggle('active',['week','day','month'][i]===v));
  render();
}
function changePeriod(d){
  if(view==='week')weekOffset+=d;
  else if(view==='day')dayOffset+=d;
  else monthOffset+=d;
  render();
}
function goToday(){weekOffset=0;dayOffset=0;monthOffset=0;render();}
function goToDay(isoStr){
  const target=new Date(isoStr),today=new Date();
  dayOffset=Math.round((target-today)/(1000*60*60*24));
  setView('day');
}

function render(){
  if(view==='week')renderWeek();
  else if(view==='day')renderDay();
  else renderMonth();
  renderTasks();
}

    dates[6].toLocaleDateString('nl-NL',{month:'short',day:'numeric'});
  document.getElementById('calBody').innerHTML=`
    <div class="grid-wrapper">
      <div class="day-headers" style="grid-template-columns:72px repeat(7,1fr)">
        <div class="day-header"></div>
        ${dates.map((d,i)=>`<div class="day-header${isToday(d)?' today':''}">${DAYS[i]}<span>${d.getDate()}</span></div>`).join('')}
      </div>
      ${PERSONS.map(p=>`
        <div class="person-row" style="grid-template-columns:72px repeat(7,1fr)">
          <div class="row-label"><div class="dot" style="background:var(--${p})"></div><span class="name person-color-${p}">${NAMES[p]}</span></div>
          ${dates.map(d=>{
            const k=iso(d);const evs=(events[k]||[]).filter(e=>e.person===p);
            return `<div class="day-cell${isToday(d)?' today-col':''}" onclick="openEventModal('${p}','${k}',event)">
              ${evs.map(ev=>`<div class="event-chip bg-${p}${ev.fromGcal?' gcal':''}" onclick="editEvent(event,'${ev.id}','${k}')" title="${ev.title}">
                ${ev.fromGcal?`<i class='ti ti-calendar' style='font-size:8px'></i>`:''}${ev.time?`<i class='ti ti-clock'></i>`:''}${trunc(ev.title,14)}
              </div>`).join('')}
              <button class="add-btn"><i class="ti ti-plus"></i></button>
            </div>`;
          }).join('')}
        </div>`).join('')}
      <div class="dinner-row">
        <div class="dinner-label"><i class="ti ti-soup"></i> Diner</div>
        ${dates.map(d=>{
          const k=iso(d),dn=dinners[k]||{};
          return `<div class="dinner-cell${isToday(d)?' today-col':''}" onclick="openDinnerModal('${k}')">
            ${dn.meal?`<span class="meal">${trunc(dn.meal,16)}</span>`:`<span class="no-meal">Maaltijd toevoegen…</span>`}
            ${dn.cook?`<div class="cook-badge bg-${dn.cook}"><i class='ti ti-chef-hat'></i>${NAMES[dn.cook]}</div>`:''}
          </div>`;
        }).join('')}
      </div>

}

function renderDay(){
  const d=getDayDate(dayOffset);const k=iso(d);
  document.getElementById('periodLabel').textContent=d.toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long'});
  const dn=dinners[k]||{};
  document.getElementById('calBody').innerHTML=`

          <i class="ti ti-calendar" style="color:var(--muted);font-size:13px"></i>
          <span style="font-size:9px;color:var(--muted);margin-top:2px">Afspraken</span>

// ── Month view ─────────────────────────────────────────────────────────────
function renderMonth(){
  const{dates,month}=getMonthDates(monthOffset);
  document.getElementById('periodLabel').textContent=month.toLocaleDateString('nl-NL',{month:'long',year:'numeric'});
  document.getElementById('calBody').innerHTML=`
    <div class="month-grid">
      <div class="month-weekdays">${DAYS.map(d=>`<div class="month-weekday">${d}</div>`).join('')}</div>
      <div class="month-cells">
        ${dates.map(d=>{
          const k=iso(d);const inMonth=d.getMonth()===month.getMonth();
          const dayEvs=events[k]||[];const dn=dinners[k]||{};
          return `<div class="month-cell${!inMonth?' other-month':''}${isToday(d)?' today-col':''}" onclick="goToDay('${k}')">
            <div class="month-day-num">${d.getDate()}</div>
            ${PERSONS.map(p=>dayEvs.filter(e=>e.person===p).map(ev=>`<div class="month-ev-chip bg-${p}">${trunc(ev.title,12)}</div>`).join('')).join('')}
            ${dn.meal?`<div class="month-dinner"><i class='ti ti-soup' style="font-size:8px"></i>${trunc(dn.meal,12)}</div>`:''}
          </div>`;
        }).join('')}

// ── Tasks ──────────────────────────────────────────────────────────────────
function renderTasks(){
  document.getElementById('taskList').innerHTML=PERSONS.map(p=>{
    const pt=tasks[p]||[];
    return `<div class="task-person">
      <div class="task-person-hdr"><div style="width:8px;height:8px;border-radius:50%;background:var(--${p})"></div><span class="person-color-${p}">${NAMES[p]}</span></div>
      ${pt.map(t=>`<div class="task-item" onclick="toggleTask('${p}','${t.id}')">
        <div class="task-check${t.done?' done':''}">${t.done?`<i class='ti ti-check'></i>`:''}</div>
        <span class="task-text${t.done?' done':''}">${t.text}</span>
      </div>`).join('')}
      <button class="add-task-btn" onclick="openTaskModal('${p}')"><i class='ti ti-plus'></i> Toevoegen</button>

}

// ── Event modal ────────────────────────────────────────────────────────────
function openEventModal(person,dateKey,e){
  if(e)e.stopPropagation();
  editingEvent=null;editingCell={person,dateKey};
  document.getElementById('evPerson').value=person;
  document.getElementById('evTitle').value='';
  document.getElementById('evTime').value='';
  document.getElementById('evSync').value=isGcalConnected()?'yes':'no';
  document.getElementById('evSync').parentElement.style.display='block';
  document.getElementById('evSyncLabel').style.display='block';
  document.getElementById('evDeleteBtn').style.display='none';
  document.getElementById('gcalBadge').style.display='none';
  document.getElementById('evTitle_hdr').innerHTML=`<i class='ti ti-calendar-plus'></i> Afspraak toevoegen`;
  document.getElementById('eventModal').classList.add('open');
  setTimeout(()=>document.getElementById('evTitle').focus(),100);
}

function editEvent(e,evId,dateKey){
  e.stopPropagation();
  const ev=(events[dateKey]||[]).find(x=>x.id===evId);if(!ev)return;
  editingEvent={evId,dateKey};editingCell=null;
  document.getElementById('evPerson').value=ev.person;
  document.getElementById('evTitle').value=ev.title;
  document.getElementById('evTime').value=ev.time||(ev.endTime?ev.time+' – '+ev.endTime:'');
  document.getElementById('evDeleteBtn').style.display='block';
  document.getElementById('gcalBadge').style.display=ev.fromGcal?'inline-flex':'none';
  // Hide sync option when editing (sync handled automatically)
  document.getElementById('evSync').parentElement.style.display='none';
  document.getElementById('evSyncLabel').style.display='none';
  document.getElementById('evTitle_hdr').innerHTML=`<i class='ti ti-pencil'></i> Afspraak bewerken`;
  document.getElementById('eventModal').classList.add('open');
  setTimeout(()=>document.getElementById('evTitle').focus(),100);
}

async function saveEvent(){
  const person=document.getElementById('evPerson').value;
  const title=document.getElementById('evTitle').value.trim();
  const time=document.getElementById('evTime').value.trim();
  const doSync=document.getElementById('evSync').value==='yes';
  if(!title)return;

  if(editingEvent){
    // Editing existing event
    const ev=(events[editingEvent.dateKey]||[]).find(x=>x.id===editingEvent.evId);
    if(ev){
      ev.person=person;ev.title=title;ev.time=time;
      // Update in Google Calendar if it came from there or was synced
      if(isGcalConnected()&&(ev.fromGcal||ev.synced)){
        await updateGcalEvent(ev,editingEvent.dateKey);
        toast('Bijgewerkt in Google Agenda');
      }
    }
  }else{
    // New event
    const k=editingCell.dateKey;
    if(!events[k])events[k]=[];
    const newEv={id:uid(),person,title,time,synced:false};
    if(doSync&&isGcalConnected()){
      const gcalId=await pushToGcal(newEv,k);
      if(gcalId){newEv.gcalId=gcalId;newEv.synced=true;newEv.fromGcal=true;}
    }
    events[k].push(newEv);
  }
  closeModal('eventModal');
  await saveShared();
  toast('Afspraak opgeslagen');
}

async function deleteEvent(){
  const{evId,dateKey}=editingEvent;
  const ev=(events[dateKey]||[]).find(x=>x.id===evId);
  if(ev&&isGcalConnected()&&(ev.fromGcal||ev.synced)){
    await deleteGcalEvent(ev);
    toast('Verwijderd uit Google Agenda');
  }
  events[dateKey]=(events[dateKey]||[]).filter(x=>x.id!==evId);
  closeModal('eventModal');
  await saveShared();
  toast('Afspraak verwijderd');
}

function openDinnerModal(key){
  editingDinnerKey=key;
  const dn=dinners[key]||{};
  document.getElementById('dinnerTitle').value=dn.meal||'';
  document.getElementById('dinnerCook').value=dn.cook||'';
  document.getElementById('dinnerModal').classList.add('open');
  setTimeout(()=>document.getElementById('dinnerTitle').focus(),100);
}
async function saveDinner(){
  const meal=document.getElementById('dinnerTitle').value.trim();
  const cook=document.getElementById('dinnerCook').value;
  if(meal)dinners[editingDinnerKey]={meal,cook};
  else delete dinners[editingDinnerKey];
  closeModal('dinnerModal');
  await saveShared();
  toast('Diner bijgewerkt');
}
async function clearDinner(){
  delete dinners[editingDinnerKey];
  closeModal('dinnerModal');
  await saveShared();
  toast('Diner verwijderd');
}

function openTaskModal(person){
  document.getElementById('taskPerson').value=person;
  document.getElementById('taskTitle').value='';
  document.getElementById('taskModal').classList.add('open');
  setTimeout(()=>document.getElementById('taskTitle').focus(),100);
}
async function saveTask(){
  const person=document.getElementById('taskPerson').value;
  const text=document.getElementById('taskTitle').value.trim();
  if(!text)return;
  if(!tasks[person])tasks[person]=[];
  tasks[person].push({id:uid(),text,done:false});
  closeModal('taskModal');
  await saveShared();
  toast('Taak toegevoegd');
}
async function toggleTask(person,id){
  const t=(tasks[person]||[]).find(x=>x.id===id);
  if(t){t.done=!t.done;await saveShared();}
}

function closeModal(id){
  document.getElementById(id).classList.remove('open');
  editingEvent=null;editingCell=null;editingDinnerKey=null;
}
document.querySelectorAll('.modal-overlay').forEach(m=>{
  m.addEventListener('click',e=>{if(e.target===m)closeModal(m.id)});
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')document.querySelectorAll('.modal-overlay.open').forEach(m=>closeModal(m.id));
  if(e.key==='Enter'){
    if(document.getElementById('eventModal').classList.contains('open'))saveEvent();
    else if(document.getElementById('dinnerModal').classList.contains('open'))saveDinner();
    else if(document.getElementById('taskModal').classList.contains('open'))saveTask();
  }
});

function trunc(s,n){return s&&s.length>n?s.slice(0,n-1)+'…':s}
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}

requestWakeLock();
handleOAuthCallback();
loadShared().then(()=>{if(isGcalConnected())fetchAllGcalEvents();});
startPolling();
</script>
